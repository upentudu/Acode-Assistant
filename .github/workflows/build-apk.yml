name: Build Acode APK

on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install NPM Dependencies
        run: npm install

      # 🔥 THE FIX: Platform ko build se PEHLE add karna hai 🔥
      - name: Add Android Platform
        run: cordova platform add android

      # Ab build script smoothly chalegi kyunki platforms folder exist karta hai
      - name: Build Web Assets and APK
        run: npm run build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acode-Assistant-APK
          path: '**/*.apk'
